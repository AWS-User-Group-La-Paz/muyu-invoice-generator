name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  lint-and-test:
    runs-on: ubuntu-24.04
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: invoice_user
          POSTGRES_PASSWORD: invoice_pass
          POSTGRES_DB: invoice_test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U invoice_user -d invoice_test_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://invoice_user:invoice_pass@localhost:5432/invoice_test_db

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: '24.16.0'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Run tests
        run: npm test
        env:
          NODE_ENV: test

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          output: trivy-fs.txt
          severity: HIGH,CRITICAL
          exit-code: '0'

      - name: Upload Trivy filesystem scan
        uses: actions/upload-artifact@v6.0.0
        with:
          name: trivy-fs
          path: trivy-fs.txt
          if-no-files-found: ignore

  build-image:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.1.0

      - name: Build Docker image
        id: docker-build
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          push: false
          tags: muyu-invoice-generator:${{ github.sha }}
          load: true

      - name: Run Trivy image scan
        if: steps.docker-build.outcome == 'success'
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: muyu-invoice-generator:${{ github.sha }}
          format: table
          output: trivy-image.txt
          severity: HIGH,CRITICAL
          exit-code: '0'

      - name: Upload Trivy image scan
        if: always()
        uses: actions/upload-artifact@v6.0.0
        with:
          name: trivy-image
          path: trivy-image.txt
          if-no-files-found: ignore

      - name: Comment Docker build result
        if: always() && github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v3.0.4
        with:
          header: docker-image-build
          message: |
            ## Docker image build

            Result: `${{ steps.docker-build.outcome }}`
            Image tag: `muyu-invoice-generator:${{ github.sha }}`
            Details: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

  security-report:
    runs-on: ubuntu-24.04
    needs: [lint-and-test, build-image]
    if: always() && github.event_name == 'pull_request'

    steps:
      - name: Download Trivy filesystem scan
        uses: actions/download-artifact@v6.0.0
        with:
          name: trivy-fs
          path: trivy-fs
        continue-on-error: true

      - name: Download Trivy image scan
        uses: actions/download-artifact@v6.0.0
        with:
          name: trivy-image
          path: trivy-image
        continue-on-error: true

      - name: Prepare Trivy comments
        run: |
          {
            echo "## Trivy filesystem scan"
            echo
            echo "Result: \`${{ needs.lint-and-test.result }}\`"
            echo "Severity: \`HIGH,CRITICAL\`"
            echo "Details: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo
            echo '```'
            if [ -f trivy-fs/trivy-fs.txt ]; then
              cat trivy-fs/trivy-fs.txt
            else
              echo "Filesystem scan did not produce a report."
            fi
            echo '```'
          } > fs-comment.txt

          {
            echo "## Trivy image scan"
            echo
            echo "Result: \`${{ needs.build-image.result }}\`"
            echo "Image tag: \`muyu-invoice-generator:${{ github.sha }}\`"
            echo "Severity: \`HIGH,CRITICAL\`"
            echo "Details: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo
            echo '```'
            if [ -f trivy-image/trivy-image.txt ]; then
              cat trivy-image/trivy-image.txt
            else
              echo "Image scan did not produce a report."
            fi
            echo '```'
          } > image-comment.txt

      - name: Comment Trivy filesystem scan
        uses: marocchino/sticky-pull-request-comment@v3.0.4
        with:
          header: trivy-fs-scan
          path: fs-comment.txt

      - name: Comment Trivy image scan
        uses: marocchino/sticky-pull-request-comment@v3.0.4
        with:
          header: trivy-image-scan
          path: image-comment.txt

  ci-complete:
    name: CI complete
    runs-on: ubuntu-24.04
    needs: [lint-and-test, build-image, security-report]
    if: always()
    steps:
      - name: Check results
        run: |
          test "${{ needs.lint-and-test.result }}" = "success"
          test "${{ needs.build-image.result }}" = "success"
