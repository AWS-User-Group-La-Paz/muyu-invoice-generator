name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

permissions:
  contents: read
  issues: write
  pull-requests: write

env:
  TRIVY_DISABLE_VEX_NOTICE: true

jobs:
  lint-and-test:
    name: Lint and test
    runs-on: ubuntu-24.04
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: invoice_user
          POSTGRES_PASSWORD: invoice_pass
          POSTGRES_DB: invoice_test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U invoice_user -d invoice_test_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://invoice_user:invoice_pass@localhost:5432/invoice_test_db

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: '24.16.0'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Run tests
        run: npm test
        env:
          NODE_ENV: test

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          output: trivy-fs.txt
          severity: HIGH,CRITICAL
          exit-code: '0'

      - name: Upload Trivy filesystem scan
        if: always()
        uses: actions/upload-artifact@v6.0.0
        with:
          name: trivy-fs
          path: trivy-fs.txt
          if-no-files-found: ignore

  build-image:
    name: Build image
    runs-on: ubuntu-24.04
    outputs:
      image_ref: ${{ steps.image.outputs.ref }}
    permissions:
      contents: read
      issues: write
      packages: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.0

      - name: Generate image reference
        id: image
        run: echo "ref=ghcr.io/${GITHUB_REPOSITORY,,}:v$(date -u +%Y.%m.%d)-r${GITHUB_RUN_NUMBER}.${GITHUB_RUN_ATTEMPT}" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.1.0

      - name: Build Docker image
        id: docker-build
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          tags: ${{ steps.image.outputs.ref }}
          load: true

      - name: Run Trivy image scan
        if: steps.docker-build.outcome == 'success'
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: ${{ steps.image.outputs.ref }}
          scanners: vuln
          format: table
          output: trivy-image.txt
          severity: HIGH,CRITICAL
          hide-progress: true
          exit-code: '1'

      - name: Upload Trivy image scan
        if: always()
        uses: actions/upload-artifact@v6.0.0
        with:
          name: trivy-image
          path: trivy-image.txt
          if-no-files-found: ignore

      - name: Push Docker image
        if: github.event_name == 'push'
        run: docker push "${{ steps.image.outputs.ref }}"

      - name: Comment Docker build result
        if: always() && github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v3.0.4
        with:
          header: docker-image-build
          message: |
            ## ${{ steps.docker-build.outcome == 'success' && '✅' || '🔴' }} Docker image build

            Result: `${{ steps.docker-build.outcome }}`
            Image tag: `${{ steps.image.outputs.ref }}`
            Details: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

  security-report:
    name: Security report
    runs-on: ubuntu-24.04
    needs: [lint-and-test, build-image]
    if: always()

    steps:
      - name: Download Trivy filesystem scan
        uses: actions/download-artifact@v6.0.0
        with:
          name: trivy-fs
          path: trivy-fs
        continue-on-error: true

      - name: Download Trivy image scan
        uses: actions/download-artifact@v6.0.0
        with:
          name: trivy-image
          path: trivy-image
        continue-on-error: true

      - name: Prepare Trivy comments
        run: |
          {
            icon="🔴"
            if [ ! -f trivy-fs/trivy-fs.txt ]; then
              body="Filesystem scan did not produce a report."
            elif grep -Eq ' (HIGH|CRITICAL) ' trivy-fs/trivy-fs.txt; then
              body="$(printf '```\n%s\n```' "$(cat trivy-fs/trivy-fs.txt)")"
            else
              icon="✅"
              body="No HIGH or CRITICAL vulnerabilities found."
            fi
            echo "## $icon Trivy filesystem scan"
            echo
            echo "Details: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo
            echo "$body"
          } > trivy-fs-comment.txt

          {
            icon="🔴"
            if [ ! -f trivy-image/trivy-image.txt ]; then
              body="Image scan did not produce a report."
            elif grep -Eq ' (HIGH|CRITICAL) ' trivy-image/trivy-image.txt; then
              body="$(printf '```\n%s\n```' "$(cat trivy-image/trivy-image.txt)")"
            else
              icon="✅"
              body="No HIGH or CRITICAL vulnerabilities found."
            fi
            echo "## $icon Trivy image scan"
            echo
            echo "Image tag: \`${{ needs.build-image.outputs.image_ref }}\`"
            echo "Details: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo
            echo "$body"
          } > trivy-image-comment.txt

      - name: Comment Trivy filesystem scan
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v3.0.4
        with:
          header: trivy-fs-scan
          path: trivy-fs-comment.txt

      - name: Comment Trivy image scan
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v3.0.4
        with:
          header: trivy-image-scan
          path: trivy-image-comment.txt

      - name: Fail on Trivy vulnerabilities
        run: |
          ! { grep -Eq ' (HIGH|CRITICAL) ' trivy-fs/trivy-fs.txt 2>/dev/null || grep -Eq ' (HIGH|CRITICAL) ' trivy-image/trivy-image.txt 2>/dev/null; }

  ci-complete:
    name: CI complete
    runs-on: ubuntu-24.04
    needs: [lint-and-test, build-image, security-report]
    if: always()
    steps:
      - name: Check results
        run: |
          test "${{ needs.lint-and-test.result }}" = "success"
          test "${{ needs.build-image.result }}" = "success"
          test "${{ needs.security-report.result }}" = "success"
